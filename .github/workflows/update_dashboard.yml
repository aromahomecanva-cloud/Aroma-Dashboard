name: Update Dashboard Data

on:
  schedule:
    # Chạy mỗi 2 tiếng, từ 8h -> 22h giờ Việt Nam (UTC+7).
    # Giờ VN 8h-22h = giờ UTC 1h-15h -> liệt kê trực tiếp các mốc UTC: 1,3,5,7,9,11,13,15
    # (tương ứng 8h,10h,12h,14h,16h,18h,20h,22h giờ VN). GitHub Actions cron LUÔN chạy theo UTC.
    - cron: '0 1,3,5,7,9,11,13,15 * * *'
  workflow_dispatch: {}      # cho phép bấm "Run workflow" chạy tay trên GitHub
  push:
    paths:
      - 'shopee_ads_exports/**'   # tự chạy ngay khi có CSV Shopee Ads mới được push lên

# Nếu 2 trigger (VD: push CSV mới + bấm chạy tay, hoặc cron trùng giờ) khởi động gần như cùng lúc,
# cả 2 run sẽ cùng build data.json từ cùng 1 điểm xuất phát rồi cùng push -> run nào push sau bị
# GitHub từ chối ("remote rejected ... cannot lock ref") vì nhánh đã bị run kia đẩy trước đó 1-2
# giây. Dữ liệu KHÔNG bị mất (run đầu vẫn thành công) nhưng run sau báo lỗi đỏ gây hoang mang.
# concurrency ở đây đảm bảo chỉ 1 run chạy job "update" tại 1 thời điểm; run đến sau sẽ XẾP HÀNG
# chờ (không huỷ run đang chạy dở, không bị mất dữ liệu) thay vì chạy song song rồi giành nhau push.
concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r business_dashboard_requirements.txt

      - name: Debug - kiểm tra secrets có được nhận không
        run: python business_dashboard_config.py
        env:
          SAPO_STORE: ${{ secrets.SAPO_STORE }}
          SAPO_API_KEY: ${{ secrets.SAPO_API_KEY }}
          SAPO_API_SECRET: ${{ secrets.SAPO_API_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Debug - xem cấu trúc order/product thật
        run: python business_dashboard_debug_raw.py
        env:
          SAPO_STORE: ${{ secrets.SAPO_STORE }}
          SAPO_API_KEY: ${{ secrets.SAPO_API_KEY }}
          SAPO_API_SECRET: ${{ secrets.SAPO_API_SECRET }}

      - name: Fetch data + build data.json
        run: python business_dashboard_export_json.py
        env:
          SAPO_STORE: ${{ secrets.SAPO_STORE }}
          SAPO_API_KEY: ${{ secrets.SAPO_API_KEY }}
          SAPO_API_SECRET: ${{ secrets.SAPO_API_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Commit data.json + cache back to repo
        run: |
          git config user.name "dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          shopt -s nullglob
          git add data.json cache_*.json.gz
          git diff --staged --quiet || git commit -m "Update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Phòng trường hợp main đã bị đẩy lên bởi 1 commit khác (VD Huy push tay) ngay trong lúc
          # job này đang chạy -- rebase commit của bot lên trên đầu mới nhất rồi mới push, tránh bị
          # GitHub từ chối vì "remote rejected". Kết hợp với concurrency ở trên để chặn race giữa
          # 2 run của chính workflow này.
          git pull --rebase origin main
          git push