name: Update Dashboard Data

on:
  schedule:
    - cron: '0 */3 * * *'   # chạy mỗi 3 tiếng, có thể sửa lại
  workflow_dispatch: {}      # cho phép bấm "Run workflow" chạy tay trên GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r business_dashboard_requirements.txt

      - name: Debug - kiểm tra secrets có được nhận không
        run: python business_dashboard_config.py
        env:
          SAPO_STORE: ${{ secrets.SAPO_STORE }}
          SAPO_API_KEY: ${{ secrets.SAPO_API_KEY }}
          SAPO_API_SECRET: ${{ secrets.SAPO_API_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Fetch data + build data.json
        run: python business_dashboard_export_json.py
        env:
          SAPO_STORE: ${{ secrets.SAPO_STORE }}
          SAPO_API_KEY: ${{ secrets.SAPO_API_KEY }}
          SAPO_API_SECRET: ${{ secrets.SAPO_API_SECRET }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}

      - name: Commit data.json back to repo
        run: |
          git config user.name "dashboard-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update dashboard data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
